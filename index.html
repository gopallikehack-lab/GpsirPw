<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GP_SIR_ERA_PW — Free Batch</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>🔮 GP_SIR_ERA</h1>
                <span class="badge">📚 FREE BATCH</span>
            </div>
            <p>Lakshya JEE 2.0 2027 — Full Access</p>
        </header>

        <!-- ===== BATCH INFO ===== -->
        <div class="batch-info glass">
            <h2>📖 Lakshya JEE 2.0 2027</h2>
            <p>Complete JEE Preparation — Free for Everyone</p>
            <div class="tags">
                <span class="tag">✅ Free</span>
                <span class="tag">📅 2026-2027</span>
                <span class="tag">🎯 JEE</span>
            </div>
        </div>

        <!-- ===== SUBJECTS ===== -->
        <div class="subjects-grid" id="subjectsGrid">
            <p>⏳ Loading subjects...</p>
        </div>

        <!-- ===== IFRAME FOR CONTENT ===== -->
        <div class="content-frame glass" id="contentFrame" style="display:none;">
            <div class="frame-header">
                <h3 id="subjectTitle">Subject</h3>
                <button onclick="closeContent()" class="close-btn">✕</button>
            </div>
            <iframe id="contentIframe" src="about:blank" style="width:100%;height:600px;border:none;border-radius:12px;"></iframe>
        </div>

        <footer>
            <p>© 2026 <strong>GP_SIR_ERA</strong> • Free Education for All</p>
            <p class="tag">~#gpsirAI</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
